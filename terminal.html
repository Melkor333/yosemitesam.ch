<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Yosemitesam</title>
  <script src="assets/vm/build/libv86.js"></script>
    <script>
"use strict";
window.onload = function()
{
    var emulator = new V86({
        wasm_path: "assets/vm/build/v86.wasm",
        memory_size: 512 * 1024 * 1024,
        vga_memory_size: 8 * 1024 * 1024,
        screen_container: document.getElementById("screen_container"),
        bios: { url: "assets/vm/bios/seabios.bin" },
        vga_bios: { url: "assets/vm/bios/vgabios.bin" },
        filesystem: {
            baseurl: "assets/vm/images/alpine-rootfs-flat",
            basefs: "assets/vm/images/alpine-fs.json",
        },
        autostart: true,
        bzimage_initrd_from_filesystem: true,
        cmdline: "rw root=host9p rootfstype=9p rootflags=trans=virtio,cache=loose modules=virtio_pci tsc=reliable init=/usr/bin/ysh",
        //initial_state: { url: "../images/alpine-state.bin" },
    });
};
</script>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: row;
    }

    #left, #right {
      height: 100%;
      overflow: auto;
    }

    #left {
      width: 50%;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #right {
      width: 50%;
      border-left: 2px solid #ccc;
      display: flex;
      flex-direction: column;
    }

    #links {
      padding: 10px;
      border-bottom: 1px solid #ccc;
      background: #f5f5f5;
    }

    #links a {
      margin-right: 10px;
      cursor: pointer;
      color: blue;
      text-decoration: underline;
    }

    #content {
      flex: 1;
      padding: 10px;
      overflow: auto;
    }

    img {
      max-width: 90%;
      border: 4px solid #444;
      border-radius: 8px;
    }

    /* 🔽 Mobile layout */
    @media (max-width: 1000px) {
      body {
        flex-direction: column;
      }

      #right {
        order: 1;
        width: 100%;
        height: auto;
        flex: 1;                 /* take remaining space */
        border-left: none;
        border-bottom: 2px solid #ccc;
        overflow: hidden;
      }

      #content {
        overflow: auto;          /* scroll only content */
      }

      #left {
        order: 2;
        width: 100%;
        height: 200px;           /* 👈 fixed height */
        flex-shrink: 0;          /* 👈 never shrink */
      }
    }
  </style>
  </head>
<body>
  <div id="left">
      <div id="screen_container">
    <div style="white-space: pre; font: 14px monospace; line-height: 14px"></div>
    <canvas style="display: none"></canvas>
      </div>
  </div>

  <div id="right">
    <div id="links">
      <a href="http://localhost:8000">Example</a>
      <a href="https://example.org">Example.org</a>
      <a href="https://httpbin.org/html">Test Page</a>
    </div>
    <div id="content">
      <p>Click a link above to load content here.</p>
    </div>
  </div>

  <script>
    const links = document.querySelectorAll("#links a");
    const content = document.getElementById("content");
    const current = new URL(window.location.href);


      document.addEventListener("click", async (e) => {
        e.preventDefault();
        const t = e.target.closest('a');
        if (!t) { return; }

        const url = t.getAttribute("href");
        const target = new URL(url, window.location.href);
        console.log(target)
        console.log(target.origin)
        console.log(current)
        console.log(current.origin)
        if (current.origin !== target.origin) {
         	window.open(url, "_blank", "noopener");
         	return;
        }
        try {
          console.log(url)
          const response = await fetch(url);
          const text = await response.text();
          content.innerHTML = text;
        } catch (err) {
          content.innerHTML = "<p style='color:red;'>Failed to load content (likely CORS issue).</p>";
          console.error(err);
        }
      });
  </script>

</body>
</html>
